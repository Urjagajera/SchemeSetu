<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - SchemeSetu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#1a365d",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#2d476f",
                        "surface-container-low": "#f4f3f7",
                        "on-surface-variant": "#43474e",
                        "on-primary-fixed": "#001b3c",
                        "inverse-surface": "#2f3033",
                        "error-container": "#ffdad6",
                        "outline": "#74777f",
                        "surface-bright": "#faf9fd",
                        "on-error-container": "#93000a",
                        "primary": "#002045",
                        "on-background": "#1a1c1e",
                        "secondary": "#1960a3",
                        "inverse-primary": "#adc7f7",
                        "error": "#ba1a1a",
                        "tertiary-fixed": "#d2e4ff",
                        "tertiary-fixed-dim": "#9fcaff",
                        "surface-variant": "#e3e2e6",
                        "surface-dim": "#dad9dd",
                        "on-secondary-container": "#00477f",
                        "on-surface": "#1a1c1e",
                        "surface": "#faf9fd",
                        "surface-container-highest": "#e3e2e6",
                        "tertiary": "#00213e",

                        "on-tertiary-fixed-variant": "#00497e",
                        "on-secondary-fixed-variant": "#004881",
                        "on-secondary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "background": "#faf9fd",
                        "secondary-fixed-dim": "#a2c9ff",
                        "primary-fixed-dim": "#adc7f7",
                        "primary-fixed": "#d6e3ff",
                        "surface-tint": "#455f88",
                        "surface-container-high": "#e9e7eb",
                        "on-primary-container": "#86a0cd",
                        "secondary-fixed": "#d3e4ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "max-width": "1280px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "margin-mobile": "16px",
                        "stack-lg": "32px"
                    },
                    "fontFamily": {
                        "heading": ["Inter"],
                        "display-mobile": ["Inter"],
                        "small": ["Inter"],
                        "body": ["Inter"],
                        "display": ["Inter"]
                    },
                    "fontSize": {
                        "heading": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "display-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "small": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "body": ["16px", {"lineHeight": "24px", "letterSpacing": "0em", "fontWeight": "400"}],
                        "display": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signup-card {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.05);
            border: 1px solid #e3e2e6;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- Top Navigation (Shell Rule: Suppressed for transactional focus, but using specific TopNavBar brand identity) -->
<header class="w-full h-16 bg-surface flex items-center justify-between px-margin-mobile md:px-margin-desktop max-w-max-width mx-auto">
<div class="flex items-center gap-2">
<span class="text-primary font-heading text-heading font-bold">SchemeSetu</span>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-1 text-on-surface-variant hover:text-secondary transition-colors font-small text-small">
<span class="material-symbols-outlined text-[20px]">language</span>
<span class="hidden sm:inline">English</span>
<span class="material-symbols-outlined text-[16px]">expand_more</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile">
<div class="w-full max-w-[440px]">
<!-- Centered Minimal Card Layout -->
<div class="signup-card bg-surface-container-lowest rounded-xl p-stack-lg md:p-10 flex flex-col gap-stack-lg">
<div class="text-center flex flex-col gap-2">
<h1 class="font-heading text-heading text-primary">Create an Account</h1>
<p class="font-body text-body text-on-surface-variant">Join SchemeSetu to access government services easily.</p>
</div>
<!-- Registration Form -->
<form class="flex flex-col gap-stack-md" onsubmit="return false;">
<!-- Full Name -->
<div class="flex flex-col gap-2">
<label class="font-small text-small text-on-surface-variant" for="full_name">Full Name</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body text-body bg-surface" id="full_name" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email Address -->
<div class="flex flex-col gap-2">
<label class="font-small text-small text-on-surface-variant" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body text-body bg-surface" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-2">
<label class="font-small text-small text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body text-body bg-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-2">
<label class="font-small text-small text-on-surface-variant" for="confirm_password">Confirm Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all font-body text-body bg-surface" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Sign Up Primary Action Button -->
<button class="w-full h-12 bg-secondary hover:bg-primary text-on-secondary font-heading font-semibold rounded-lg transition-all active:scale-[0.98] mt-2 shadow-sm">
                        Sign Up
                    </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] bg-outline-variant flex-grow"></div>
<span class="font-small text-small text-on-surface-variant uppercase tracking-wider">or</span>
<div class="h-[1px] bg-outline-variant flex-grow"></div>
</div>
<!-- Google Signup -->
<button class="w-full h-12 border border-outline-variant bg-surface hover:bg-surface-container-low text-on-surface font-body font-medium rounded-lg flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12.16-4.53z" fill="#EA4335"></path>
</svg>
                    Sign up with Google
                </button>
<!-- Login Link -->
<div class="text-center">
<p class="font-body text-body text-on-surface-variant">
                        Already have an account? 
                        <a class="text-secondary font-semibold hover:underline" href="#">Login</a>
</p>
</div>
</div>
</div>
</main>
<!-- Footer (Shared Component Guidance) -->
<footer class="w-full py-stack-lg px-margin-mobile md:px-margin-desktop bg-primary text-on-primary mt-auto">
<div class="max-w-max-width mx-auto flex flex-col md:flex-row justify-between items-center gap-stack-md">
<div class="flex flex-col items-center md:items-start gap-1">
<span class="font-heading text-heading text-on-primary">SchemeSetu</span>
<p class="font-small text-small text-on-primary-container">© 2024 SchemeSetu - Government of India. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-gutter">
<a class="font-small text-small text-on-primary-container hover:text-on-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-small text-small text-on-primary-container hover:text-on-primary transition-colors" href="#">Terms of Service</a>
<a class="font-small text-small text-on-primary-container hover:text-on-primary transition-colors" href="#">Help Desk</a>
<a class="font-small text-small text-on-primary-container hover:text-on-primary transition-colors" href="#">Contact Us</a>
</div>
</div>
</footer>
<!-- Atmosphere Decoration (Subtle animated background) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden opacity-30">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary-container/10 rounded-full blur-[100px]"></div>
</div>
<script>
        // Micro-interactions
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '#1960a3'; // secondary color
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').style.color = '#43474e'; // on-surface-variant
            });
        });

        // Toggle Password Visibility
        const toggleBtn = document.querySelector('button .material-symbols-outlined:contains("visibility")');
        if (toggleBtn) {
            toggleBtn.parentElement.addEventListener('click', function() {
                const input = this.parentElement.querySelector('input');
                const icon = this.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility';
                }
            });
        }
    </script>
</body></html>

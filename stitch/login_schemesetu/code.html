<!-- Main Content Canvas -->

</div>

<p class="font-small text-small text-on-surface-variant">Empowering Citizens through Access</p>
</div>
<!-- Login/Signup Toggle -->
<div class="bg-surface-container-low p-1 rounded-lg flex mb-stack-lg relative overflow-hidden">
<div class="absolute h-[calc(100%-8px)] w-[calc(50%-4px)] bg-white rounded-md shadow-sm transition-all duration-300 left-1 top-1" id="active-indicator"></div>
<button class="flex-1 py-2 text-small font-small z-20 text-on-surface transition-colors duration-300" id="btn-login" onclick="toggleAuth('login')">Login</button>
<button class="flex-1 py-2 text-small font-small z-20 text-on-surface-variant transition-colors duration-300" id="btn-signup" onclick="toggleAuth('signup')">Sign Up</button>
</div>
<!-- Auth Form -->
<div class="space-y-stack-md">
<div class="space-y-stack-md">
<div class="space-y-2">
<label class="font-small text-small text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none font-body" id="email" placeholder="e.g. name@example.com" type="email">
</div>
<div class="space-y-2">
<label class="font-small text-small text-on-surface-variant ml-1" for="password">Password</label>
<input class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary transition-all outline-none font-body" id="password" placeholder="••••••••" type="password">
</div>
</div>
<div class="flex items-center justify-between mb-stack-md">
<label class="flex items-center gap-2 cursor-pointer group">
<input type="checkbox" class="w-4 h-4 rounded border-outline-variant text-secondary focus:ring-secondary">
<span class="text-small font-small text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>

</div><button class="w-full bg-secondary hover:bg-on-secondary-container text-on-secondary py-3 px-6 rounded-lg font-small text-body shadow-sm hover:shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2"><span class="">Login</span>
<span class="material-symbols-outlined text-[20px]">login</span></button>
</div>
<!-- Social/Alt Login Separation -->
<div class="relative my-stack-lg flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-4 text-small font-small text-on-surface-variant bg-surface-container-lowest px-2">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Alternative Auth Methods -->
<button class="w-full flex items-center justify-center gap-3 py-3 border border-outline-variant rounded-lg hover:bg-surface-container transition-all group">

</div>
<script>
        function toggleAuth(mode) {
            const indicator = document.getElementById('active-indicator');
            const loginBtn = document.getElementById('btn-login');
            const signupBtn = document.getElementById('btn-signup');
            const formTitle = document.getElementById('form-title');
            const formDesc = document.getElementById('form-description');
            
            if (mode === 'login') {
                indicator.style.left = '4px';
                loginBtn.classList.add('text-on-surface');
                loginBtn.classList.remove('text-on-surface-variant');
                signupBtn.classList.add('text-on-surface-variant');
                signupBtn.classList.remove('text-on-surface');
                formTitle.innerText = "Enter your Mobile Number";
                formDesc.innerText = "We'll send a one-time password (OTP) to verify your identity.";
            } else {
                indicator.style.left = 'calc(50% - 0px)';
                signupBtn.classList.add('text-on-surface');
                signupBtn.classList.remove('text-on-surface-variant');
                loginBtn.classList.add('text-on-surface-variant');
                loginBtn.classList.remove('text-on-surface');
                formTitle.innerText = "Register your Mobile Number";
                formDesc.innerText = "Create your Citizen Account to access 500+ government schemes.";
            }
        }

        // Simple animation on input focus
        const mobileInput = document.getElementById('mobile');
        mobileInput.addEventListener('focus', () => {
            mobileInput.parentElement.classList.add('scale-[1.02]');
        });
        mobileInput.addEventListener('blur', () => {
            mobileInput.parentElement.classList.remove('scale-[1.02]');
        });

        // OTP field formatting
        mobileInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '').substring(0, 10);
        });
    </script>
